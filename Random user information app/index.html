<!DOCTYPE html>
<html>
<head>
    <title>Random User App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Random User Generator 👤</h2>

    <div id="userCard">
        <img id="userImage" width="120">
        <h3 id="userName"></h3>
        <p id="userEmail"></p>
        <p id="userPhone"></p>
        <p id="userLocation"></p>
    </div>

    <p id="loadingText"></p>
    <p id="errorText" style="color:red;"></p>

    <button id="generateBtn">Generate User</button>
</div>

<script src="script.js"></script>
</body>
</html>
